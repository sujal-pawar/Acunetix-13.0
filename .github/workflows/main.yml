name: Deploy React Site
on:
  push:
    branches: ["main"]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --frozen-lockfile # This is faster and more stable
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # MUST BE ./dist now that docs is deleted
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
